name: Reusable Terragrunt Workflow with Firefly

on:
  workflow_dispatch:
    inputs:
      terragrunt_version:
        required: false
        type: string
        default: '0.68.0'
        description: 'Terragrunt version to use'
      terraform_version:
        required: false
        type: string
        default: '1.8.1'
        description: 'Terraform version to use'
      should_apply:
        required: false
        type: boolean
        default: false
        description: 'Whether to apply the Terraform changes'

# Concurrency settings - only one workflow per branch runs at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terragrunt-plan:
    runs-on: ubuntu-latest
    
    env:
      PLAN_FILE_NAME: "tf.plan"
      WORKSPACE: ${{ github.repository}}
      INIT_LOG_FILE: "init_log.jsonl"
      PLAN_OUTPUT_FILE: "plan_output.json"
      PLAN_JSON_LOG_FILE: "plan_log.jsonl"
      PLAN_RAW_LOG_FILE: "plan_output_raw.log"
      APPLY_LOG_FILE: "apply_log.jsonl"
      # AWS credentials for Terraform/Terragrunt
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"
      # Terraform debug logging - use predictable path for artifact capture
      TF_LOG: DEBUG
      TF_LOG_PATH: /tmp/terraform_debug.log
      # Terragrunt debug logging for signal tracing
      TERRAGRUNT_LOG_LEVEL: debug
      TG_LOG: debug
      # Signal chain log file
      SIGNAL_CHAIN_LOG: /tmp/signal_chain.log
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          sudo wget -q -O /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Setup AWS CLI
        run: |
          if command -v aws &> /dev/null; then
            echo "AWS CLI already installed, using existing version"
            aws --version
          else
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
            aws --version
          fi

      - name: Setup IAC Wrapper
        uses: gofireflyio/fireflyci/terragrunt@infl-16943-forwrd-term-sigs
        with:
          install-terragrunt-wrapper: 'true' 
    
      - name: Verify AWS Access
        run: |
          echo "Testing AWS credentials..."
          aws sts get-caller-identity
          echo "Testing S3 bucket access..."
          aws s3 ls s3://dm-terraform-state-test/ || echo "S3 bucket access failed - check permissions"

      - name: Initialize Terragrunt
        run: |
          LOG=${{ env.SIGNAL_CHAIN_LOG }}
          
          echo "========================================" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] TERRAGRUNT INIT - Signal Chain Tracing" >> $LOG
          echo "========================================" >> $LOG
          echo "Shell PID: $$, Parent PID: $PPID" >> $LOG
          
          # Trap signals with logging and forwarding
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] INIT Shell $$ received SIGHUP" >> $LOG' HUP
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] INIT Shell $$ received SIGINT, forwarding to Terragrunt PID $TG_PID" >> $LOG; kill -INT $TG_PID 2>/dev/null; exit 130' INT
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] INIT Shell $$ received SIGTERM, forwarding to Terragrunt PID $TG_PID" >> $LOG; kill -TERM $TG_PID 2>/dev/null; exit 143' TERM
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Starting terragrunt init" >> $LOG
          terragrunt run-all init --terragrunt-non-interactive &
          TG_PID=$!
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt init PID: $TG_PID" >> $LOG
          
          wait $TG_PID
          EXIT_CODE=$?
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt init completed with exit code: $EXIT_CODE" >> $LOG
          echo "" >> $LOG
          exit $EXIT_CODE

      - name: Terragrunt Plan
        id: plan
        run: |
          LOG=${{ env.SIGNAL_CHAIN_LOG }}
          
          echo "========================================" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] TERRAGRUNT PLAN - Signal Chain Tracing" >> $LOG
          echo "========================================" >> $LOG
          echo "Shell PID: $$" >> $LOG
          echo "Parent PID: $PPID" >> $LOG
          echo "" >> $LOG
          
          # Function to log signal with process tree
          log_signal() {
            local sig=$1
            local timestamp=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)
            echo "[$timestamp] ===== SIGNAL RECEIVED: $sig =====" >> $LOG
            echo "[$timestamp] Shell PID $$ received $sig" >> $LOG
            echo "[$timestamp] Process tree at signal receipt:" >> $LOG
            ps -ef --forest 2>/dev/null | grep -E "(terragrunt|terraform|$$)" >> $LOG || ps auxf >> $LOG 2>/dev/null || ps aux >> $LOG
            echo "" >> $LOG
          }
          
          # Function to forward signal to child and log
          forward_signal() {
            local sig=$1
            local timestamp=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)
            if [ -n "$TG_PID" ] && kill -0 $TG_PID 2>/dev/null; then
              echo "[$timestamp] Forwarding $sig to Terragrunt PID $TG_PID" >> $LOG
              kill -s $sig $TG_PID 2>/dev/null
              echo "[$timestamp] Signal forwarded to Terragrunt, waiting for exit..." >> $LOG
            else
              echo "[$timestamp] Terragrunt PID $TG_PID not running, cannot forward $sig" >> $LOG
            fi
          }
          
          # Trap signals with detailed logging
          trap 'log_signal SIGHUP' HUP
          trap 'log_signal SIGINT; forward_signal INT; exit 130' INT
          trap 'log_signal SIGTERM; forward_signal TERM; exit 143' TERM
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Starting terragrunt plan" >> $LOG
          
          # Run in background so shell can receive signals
          terragrunt run-all plan -- -json -out=${{ env.PLAN_FILE_NAME }} &
          TG_PID=$!
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt PID: $TG_PID" >> $LOG
          
          # Log initial process tree
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Initial process tree:" >> $LOG
          sleep 2  # Give terragrunt time to spawn children
          ps -ef --forest 2>/dev/null | grep -E "(terragrunt|terraform|PID)" >> $LOG || ps auxf >> $LOG 2>/dev/null || ps aux >> $LOG
          echo "" >> $LOG
          
          # Log child processes of terragrunt
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt child processes:" >> $LOG
          pgrep -P $TG_PID 2>/dev/null | while read child; do
            echo "  Child PID: $child ($(ps -p $child -o comm= 2>/dev/null))" >> $LOG
          done
          echo "" >> $LOG
          
          wait $TG_PID
          EXIT_CODE=$?
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt plan completed with exit code: $EXIT_CODE" >> $LOG
          echo "========================================" >> $LOG
          echo "" >> $LOG
          exit $EXIT_CODE
          
      - name: Firefly Post Plan - Database
        uses: gofireflyio/fireflyci@sync-wrapper
        with:
          command: post-plan
          environment: database
          workspace: ${{ env.WORKSPACE }}
          terragrunt-version: ${{ inputs.terragrunt_version }}
          init-log-file: database/${{ env.INIT_LOG_FILE }}
          plan-output-file: database/${{ env.PLAN_OUTPUT_FILE }}
          plan-json-log-file: database/${{ env.PLAN_JSON_LOG_FILE }}
          plan-raw-log-file: database/${{ env.PLAN_RAW_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Firefly Post Plan - Generator
        uses: gofireflyio/fireflyci@sync-wrapper
        with:
          command: post-plan
          environment: generator
          terragrunt-version: ${{ inputs.terragrunt_version }}
          workspace: ${{ env.WORKSPACE }}
          init-log-file: generator/${{ env.INIT_LOG_FILE }}
          plan-output-file: generator/${{ env.PLAN_OUTPUT_FILE }}
          plan-json-log-file: generator/${{ env.PLAN_JSON_LOG_FILE }}
          plan-raw-log-file: generator/${{ env.PLAN_RAW_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Firefly Post Plan - VPC
        uses: gofireflyio/fireflyci@sync-wrapper
        with:
          command: post-plan
          environment: vpc
          terragrunt-version: ${{ inputs.terragrunt_version }}
          workspace: ${{ env.WORKSPACE }}
          init-log-file: vpc/${{ env.INIT_LOG_FILE }}
          plan-output-file: vpc/${{ env.PLAN_OUTPUT_FILE }}
          plan-json-log-file: vpc/${{ env.PLAN_JSON_LOG_FILE }}
          plan-raw-log-file: vpc/${{ env.PLAN_RAW_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Terragrunt Apply
        id: apply
        if: inputs.should_apply == true && steps.plan.outcome == 'success'
        run: |
          LOG=${{ env.SIGNAL_CHAIN_LOG }}

          echo "========================================" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] TERRAGRUNT APPLY - Signal Chain Tracing" >> $LOG
          echo "========================================" >> $LOG
          echo "Shell PID: $$, Parent PID: $PPID" >> $LOG

          # Trap signals with logging and forwarding
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] APPLY Shell $$ received SIGHUP" >> $LOG' HUP
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] APPLY Shell $$ received SIGINT, forwarding to Terragrunt PID $TG_PID" >> $LOG; kill -INT $TG_PID 2>/dev/null; exit 130' INT
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] APPLY Shell $$ received SIGTERM, forwarding to Terragrunt PID $TG_PID" >> $LOG; kill -TERM $TG_PID 2>/dev/null; exit 143' TERM

          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Starting terragrunt apply" >> $LOG
          terragrunt run-all apply --terragrunt-non-interactive -- -auto-approve -json &
          TG_PID=$!
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt apply PID: $TG_PID" >> $LOG

          # Log process tree after startup
          sleep 2
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Process tree:" >> $LOG
          ps -ef --forest 2>/dev/null | grep -E "(terragrunt|terraform|PID)" >> $LOG || ps aux >> $LOG

          wait $TG_PID
          EXIT_CODE=$?
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt apply completed with exit code: $EXIT_CODE" >> $LOG
          echo "========================================" >> $LOG
          echo "" >> $LOG
          exit $EXIT_CODE

      - name: Firefly Post Apply - Database
        if: inputs.should_apply == true && steps.apply.outcome == 'success'
        uses: gofireflyio/fireflyci@sync-wrapper
        with:
          command: post-apply
          environment: database
          workspace: ${{ env.WORKSPACE }}
          terragrunt-version: ${{ inputs.terragrunt_version }}
          apply-log-file: database/${{ env.APPLY_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Firefly Post Apply - Generator
        if: inputs.should_apply == true && steps.apply.outcome == 'success'
        uses: gofireflyio/fireflyci@sync-wrapper
        with:
          command: post-apply
          environment: generator
          terragrunt-version: ${{ inputs.terragrunt_version }}
          workspace: ${{ env.WORKSPACE }}
          apply-log-file: generator/${{ env.APPLY_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Firefly Post Apply - VPC
        if: inputs.should_apply == true && steps.apply.outcome == 'success'
        uses: gofireflyio/fireflyci@sync-wrapper
        with:
          command: post-apply
          environment: vpc
          terragrunt-version: ${{ inputs.terragrunt_version }}
          workspace: ${{ env.WORKSPACE }}
          apply-log-file: vpc/${{ env.APPLY_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      # Capture final signal state before upload
      - name: Capture Final Signal State
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          echo "=== Final Signal State Capture ===" 
          echo "Job status: $JOB_STATUS"
          echo ""
          
          # Append job status to signal chain log
          CHAIN_LOG=${{ env.SIGNAL_CHAIN_LOG }}
          if [ -f "$CHAIN_LOG" ]; then
            echo "========================================" >> "$CHAIN_LOG"
            echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] JOB ENDING" >> "$CHAIN_LOG"
            echo "Job status: $JOB_STATUS" >> "$CHAIN_LOG"
            echo "========================================" >> "$CHAIN_LOG"
            
            echo "=== Signal Chain Log Contents ==="
            cat "$CHAIN_LOG"
          else
            echo "No signal chain log found at: $CHAIN_LOG"
          fi

      # Upload debug logs as artifact - runs even on cancellation/failure
      # This must run ASAP on job end to capture logs before runner termination
      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            /tmp/terraform_debug.log
            /tmp/signal_chain.log
            /tmp/iac_wrapper_signals.log
          if-no-files-found: warn
          retention-days: 7

  # Cleanup job - runs after main job completes (success, failure, or cancellation)
  # This job runs on a fresh runner and can access artifacts uploaded by the main job
  cleanup:
    runs-on: ubuntu-latest
    needs: terragrunt-plan
    if: always()
    
    steps:
      - name: Download Debug Logs
        uses: actions/download-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: ./debug-logs
        continue-on-error: true

      - name: Display Job Status
        run: |
          echo "Main job result: ${{ needs.terragrunt-plan.result }}"
          echo "Workflow run ID: ${{ github.run_id }}"
          echo "Triggered by: ${{ github.event_name }}"
          
      - name: Process Debug Logs
        if: always()
        run: |
          echo "=== Available Debug Logs ==="
          ls -la ./debug-logs/ 2>/dev/null || echo "No debug-logs directory found"
          echo ""
          
          # Process Terraform debug log
          if [ -f ./debug-logs/terraform_debug.log ]; then
            echo "=== Terraform Debug Log Summary ==="
            echo "Log file size: $(wc -c < ./debug-logs/terraform_debug.log) bytes"
            echo "Log file lines: $(wc -l < ./debug-logs/terraform_debug.log)"
            echo ""
            echo "=== Last 100 lines of terraform debug log ==="
            tail -100 ./debug-logs/terraform_debug.log
          else
            echo "No terraform debug log file found"
          fi
          
          echo ""
          
          # Process Signal Chain Log (GitHub Runner -> Terragrunt)
          if [ -f ./debug-logs/signal_chain.log ]; then
            echo "=== SIGNAL CHAIN LOG (Shell -> Terragrunt) ==="
            echo "Log file size: $(wc -c < ./debug-logs/signal_chain.log) bytes"
            echo "Log file lines: $(wc -l < ./debug-logs/signal_chain.log)"
            echo ""
            echo "=== Full Contents ==="
            cat ./debug-logs/signal_chain.log
            echo ""
          else
            echo "No signal chain log found"
          fi
          
          echo ""
          
          # Process IAC Wrapper Signal Log (Terragrunt -> IAC Wrapper -> Terraform)
          if [ -f ./debug-logs/iac_wrapper_signals.log ]; then
            echo "=== IAC WRAPPER SIGNAL LOG (Terragrunt -> IAC Wrapper -> Terraform) ==="
            echo "Log file size: $(wc -c < ./debug-logs/iac_wrapper_signals.log) bytes"
            echo "Log file lines: $(wc -l < ./debug-logs/iac_wrapper_signals.log)"
            echo ""
            echo "=== Full Contents ==="
            cat ./debug-logs/iac_wrapper_signals.log
            echo ""
          else
            echo "No IAC wrapper signal log found - Terragrunt may not be forwarding signals to IAC wrapper"
          fi

      - name: Report Cancellation
        if: cancelled() || needs.terragrunt-plan.result == 'cancelled'
        run: |
          echo "::warning::Workflow was cancelled. Debug logs may be incomplete."
          echo "Check the debug-logs artifact for any captured logs."
