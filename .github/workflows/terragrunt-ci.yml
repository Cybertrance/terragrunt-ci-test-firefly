name: Reusable Terragrunt Workflow with Firefly

on:
  workflow_dispatch:
    inputs:
      terragrunt_version:
        required: false
        type: string
        default: '0.68.0'
        description: 'Terragrunt version to use'
      terraform_version:
        required: false
        type: string
        default: '1.8.1'
        description: 'Terraform version to use'
      should_apply:
        required: false
        type: boolean
        default: false
        description: 'Whether to apply the Terraform changes'

# Concurrency settings - only one workflow per branch runs at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terragrunt-plan:
    runs-on: ubuntu-latest
    
    env:
      PLAN_FILE_NAME: "tf.plan"
      WORKSPACE: ${{ github.repository}}
      INIT_LOG_FILE: "init_log.jsonl"
      PLAN_OUTPUT_FILE: "plan_output.json"
      PLAN_JSON_LOG_FILE: "plan_log.jsonl"
      PLAN_RAW_LOG_FILE: "plan_output_raw.log"
      APPLY_LOG_FILE: "apply_log.jsonl"
      # AWS credentials for Terraform/Terragrunt
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"
      # Terraform debug logging - use predictable path for artifact capture
      TF_LOG: DEBUG
      TF_LOG_PATH: /tmp/terraform_debug.log
      # Terragrunt debug logging for signal tracing
      TERRAGRUNT_LOG_LEVEL: debug
      TG_LOG: debug
      # Signal chain log file
      SIGNAL_CHAIN_LOG: /tmp/signal_chain.log
    
    steps:
      - name: Setup Signal Monitoring
        run: |
          SIGNAL_LOG="/tmp/termination_signals_$$.log"
          echo "Signal monitoring started at $(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$SIGNAL_LOG"
          echo "PID: $$" >> "$SIGNAL_LOG"
          echo "PPID: $PPID" >> "$SIGNAL_LOG"
          echo "---" >> "$SIGNAL_LOG"
          
          # Create a script that monitors for signals
          cat > /tmp/signal_monitor.sh << 'MONITOR_EOF'
          #!/bin/bash
          LOG_FILE="$1"
          
          log_signal() {
            local sig="$1"
            echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Received signal: $sig ($$)" >> "$LOG_FILE"
          }
          
          # Trap all common signals
          trap 'log_signal SIGHUP' HUP
          trap 'log_signal SIGINT' INT
          trap 'log_signal SIGQUIT' QUIT
          trap 'log_signal SIGTERM' TERM
          trap 'log_signal SIGUSR1' USR1
          trap 'log_signal SIGUSR2' USR2
          trap 'log_signal SIGPIPE' PIPE
          trap 'log_signal SIGALRM' ALRM
          trap 'log_signal SIGCONT' CONT
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Signal monitor started (PID: $$)" >> "$LOG_FILE"
          
          # Keep running and log heartbeat every 30 seconds
          while true; do
            sleep 30
            echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Heartbeat - still monitoring" >> "$LOG_FILE"
          done
          MONITOR_EOF
          
          chmod +x /tmp/signal_monitor.sh
          
          # Start the signal monitor in background
          nohup /tmp/signal_monitor.sh "$SIGNAL_LOG" &
          MONITOR_PID=$!
          echo "Signal monitor PID: $MONITOR_PID" >> "$SIGNAL_LOG"
          
          # Save the log file path for later steps
          echo "SIGNAL_LOG=$SIGNAL_LOG" >> "$GITHUB_ENV"
          echo "SIGNAL_MONITOR_PID=$MONITOR_PID" >> "$GITHUB_ENV"
          
          echo "Signal monitoring initialized. Log file: $SIGNAL_LOG"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          sudo wget -q -O /usr/local/bin/terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v${{ inputs.terragrunt_version }}/terragrunt_linux_amd64
          sudo chmod +x /usr/local/bin/terragrunt
          terragrunt --version

      - name: Setup AWS CLI
        run: |
          if command -v aws &> /dev/null; then
            echo "AWS CLI already installed, using existing version"
            aws --version
          else
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
            aws --version
          fi

      - name: Setup IAC Wrapper
        uses: gofireflyio/fireflyci/terragrunt@infl-16943-forwrd-term-sigs
        with:
          install-terragrunt-wrapper: 'true' 
    
      - name: Verify AWS Access
        run: |
          echo "Testing AWS credentials..."
          aws sts get-caller-identity
          echo "Testing S3 bucket access..."
          aws s3 ls s3://dm-terraform-state-test/ || echo "S3 bucket access failed - check permissions"

      - name: Initialize Terragrunt
        run: |
          LOG=/tmp/termination_signals_init.log
          CHAIN_LOG=${{ env.SIGNAL_CHAIN_LOG }}
          
          echo "========================================" >> $CHAIN_LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] TERRAGRUNT INIT - Signal Chain Tracing" >> $CHAIN_LOG
          echo "========================================" >> $CHAIN_LOG
          echo "Shell PID: $$, Parent PID: $PPID" >> $CHAIN_LOG
          
          # Trap signals with logging and forwarding
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] INIT Shell $$ received SIGHUP" >> $CHAIN_LOG' HUP
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] INIT Shell $$ received SIGINT, forwarding to $TG_PID" >> $CHAIN_LOG; echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] INIT received SIGINT" >> $LOG; kill -INT $TG_PID 2>/dev/null; exit 130' INT
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] INIT Shell $$ received SIGTERM, forwarding to $TG_PID" >> $CHAIN_LOG; echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] INIT received SIGTERM" >> $LOG; kill -TERM $TG_PID 2>/dev/null; exit 143' TERM
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Starting terragrunt init" >> $LOG
          terragrunt run-all init --terragrunt-non-interactive &
          TG_PID=$!
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt init PID: $TG_PID" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt init PID: $TG_PID" >> $CHAIN_LOG
          
          wait $TG_PID
          EXIT_CODE=$?
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt init completed with exit code: $EXIT_CODE" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt init completed with exit code: $EXIT_CODE" >> $CHAIN_LOG
          echo "" >> $CHAIN_LOG
          exit $EXIT_CODE

      - name: Terragrunt Plan
        id: plan
        run: |
          LOG=/tmp/termination_signals_plan.log
          CHAIN_LOG=${{ env.SIGNAL_CHAIN_LOG }}
          
          echo "========================================" >> $CHAIN_LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] TERRAGRUNT PLAN - Signal Chain Tracing" >> $CHAIN_LOG
          echo "========================================" >> $CHAIN_LOG
          echo "Shell PID: $$" >> $CHAIN_LOG
          echo "Parent PID: $PPID" >> $CHAIN_LOG
          echo "" >> $CHAIN_LOG
          
          # Function to log signal with process tree
          log_signal() {
            local sig=$1
            local timestamp=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)
            echo "[$timestamp] ===== SIGNAL RECEIVED: $sig =====" >> $CHAIN_LOG
            echo "[$timestamp] Shell PID $$ received $sig" >> $LOG
            echo "[$timestamp] Shell PID $$ received $sig" >> $CHAIN_LOG
            echo "[$timestamp] Process tree at signal receipt:" >> $CHAIN_LOG
            ps -ef --forest 2>/dev/null | grep -E "(terragrunt|terraform|$$)" >> $CHAIN_LOG || ps auxf >> $CHAIN_LOG 2>/dev/null || ps aux >> $CHAIN_LOG
            echo "" >> $CHAIN_LOG
          }
          
          # Function to forward signal to child and log
          forward_signal() {
            local sig=$1
            local timestamp=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)
            if [ -n "$TG_PID" ] && kill -0 $TG_PID 2>/dev/null; then
              echo "[$timestamp] Forwarding $sig to Terragrunt PID $TG_PID" >> $CHAIN_LOG
              echo "[$timestamp] Forwarding $sig to Terragrunt PID $TG_PID" >> $LOG
              kill -s $sig $TG_PID 2>/dev/null
              echo "[$timestamp] Signal forwarded, waiting for process to exit..." >> $CHAIN_LOG
            else
              echo "[$timestamp] Terragrunt PID $TG_PID not running, cannot forward $sig" >> $CHAIN_LOG
            fi
          }
          
          # Trap signals with detailed logging
          trap 'log_signal SIGHUP' HUP
          trap 'log_signal SIGINT; forward_signal INT; exit 130' INT
          trap 'log_signal SIGTERM; forward_signal TERM; exit 143' TERM
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Starting terragrunt plan" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Starting terragrunt plan" >> $CHAIN_LOG
          
          # Run in background so shell can receive signals
          terragrunt run-all plan -- -json -out=${{ env.PLAN_FILE_NAME }} &
          TG_PID=$!
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt PID: $TG_PID" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt PID: $TG_PID" >> $CHAIN_LOG
          
          # Log initial process tree
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Initial process tree:" >> $CHAIN_LOG
          sleep 2  # Give terragrunt time to spawn children
          ps -ef --forest 2>/dev/null | grep -E "(terragrunt|terraform|PID)" >> $CHAIN_LOG || ps auxf >> $CHAIN_LOG 2>/dev/null || ps aux >> $CHAIN_LOG
          echo "" >> $CHAIN_LOG
          
          # Log child processes of terragrunt
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt child processes:" >> $CHAIN_LOG
          pgrep -P $TG_PID 2>/dev/null | while read child; do
            echo "  Child PID: $child ($(ps -p $child -o comm= 2>/dev/null))" >> $CHAIN_LOG
          done
          echo "" >> $CHAIN_LOG
          
          wait $TG_PID
          EXIT_CODE=$?
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt plan completed with exit code: $EXIT_CODE" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt plan completed with exit code: $EXIT_CODE" >> $CHAIN_LOG
          echo "========================================" >> $CHAIN_LOG
          echo "" >> $CHAIN_LOG
          exit $EXIT_CODE
          
      - name: Firefly Post Plan - Database
        uses: gofireflyio/fireflyci@v0.6.1
        with:
          command: post-plan
          environment: database
          workspace: ${{ env.WORKSPACE }}
          terragrunt-version: ${{ inputs.terragrunt_version }}
          init-log-file: database/${{ env.INIT_LOG_FILE }}
          plan-output-file: database/${{ env.PLAN_OUTPUT_FILE }}
          plan-json-log-file: database/${{ env.PLAN_JSON_LOG_FILE }}
          plan-raw-log-file: database/${{ env.PLAN_RAW_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Firefly Post Plan - Generator
        uses: gofireflyio/fireflyci@v0.6.1
        with:
          command: post-plan
          environment: generator
          terragrunt-version: ${{ inputs.terragrunt_version }}
          workspace: ${{ env.WORKSPACE }}
          init-log-file: generator/${{ env.INIT_LOG_FILE }}
          plan-output-file: generator/${{ env.PLAN_OUTPUT_FILE }}
          plan-json-log-file: generator/${{ env.PLAN_JSON_LOG_FILE }}
          plan-raw-log-file: generator/${{ env.PLAN_RAW_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Firefly Post Plan - VPC
        uses: gofireflyio/fireflyci@v0.6.1
        with:
          command: post-plan
          environment: vpc
          terragrunt-version: ${{ inputs.terragrunt_version }}
          workspace: ${{ env.WORKSPACE }}
          init-log-file: vpc/${{ env.INIT_LOG_FILE }}
          plan-output-file: vpc/${{ env.PLAN_OUTPUT_FILE }}
          plan-json-log-file: vpc/${{ env.PLAN_JSON_LOG_FILE }}
          plan-raw-log-file: vpc/${{ env.PLAN_RAW_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Terragrunt Apply
        id: apply
        if: inputs.should_apply == true && steps.plan.outcome == 'success'
        run: |
          LOG=/tmp/termination_signals_apply.log
          CHAIN_LOG=${{ env.SIGNAL_CHAIN_LOG }}
          
          echo "========================================" >> $CHAIN_LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] TERRAGRUNT APPLY - Signal Chain Tracing" >> $CHAIN_LOG
          echo "========================================" >> $CHAIN_LOG
          echo "Shell PID: $$, Parent PID: $PPID" >> $CHAIN_LOG
          
          # Trap signals with logging and forwarding
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] APPLY Shell $$ received SIGHUP" >> $CHAIN_LOG' HUP
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] APPLY Shell $$ received SIGINT, forwarding to $TG_PID" >> $CHAIN_LOG; echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] APPLY received SIGINT" >> $LOG; kill -INT $TG_PID 2>/dev/null; exit 130' INT
          trap 'echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] APPLY Shell $$ received SIGTERM, forwarding to $TG_PID" >> $CHAIN_LOG; echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] APPLY received SIGTERM" >> $LOG; kill -TERM $TG_PID 2>/dev/null; exit 143' TERM
          
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Starting terragrunt apply" >> $LOG
          terragrunt run-all apply --terragrunt-non-interactive -- -auto-approve -json &
          TG_PID=$!
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt apply PID: $TG_PID" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt apply PID: $TG_PID" >> $CHAIN_LOG
          
          # Log process tree after startup
          sleep 2
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Process tree:" >> $CHAIN_LOG
          ps -ef --forest 2>/dev/null | grep -E "(terragrunt|terraform|PID)" >> $CHAIN_LOG || ps aux >> $CHAIN_LOG
          
          wait $TG_PID
          EXIT_CODE=$?
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt apply completed with exit code: $EXIT_CODE" >> $LOG
          echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Terragrunt apply completed with exit code: $EXIT_CODE" >> $CHAIN_LOG
          echo "" >> $CHAIN_LOG
          exit $EXIT_CODE

      - name: Firefly Post Apply - Database
        if: inputs.should_apply == true && steps.apply.outcome == 'success'
        uses: gofireflyio/fireflyci@v0.6.1
        with:
          command: post-apply
          environment: database
          workspace: ${{ env.WORKSPACE }}
          terragrunt-version: ${{ inputs.terragrunt_version }}
          apply-log-file: database/${{ env.APPLY_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Firefly Post Apply - Generator
        if: inputs.should_apply == true && steps.apply.outcome == 'success'
        uses: gofireflyio/fireflyci@v0.6.1
        with:
          command: post-apply
          environment: generator
          terragrunt-version: ${{ inputs.terragrunt_version }}
          workspace: ${{ env.WORKSPACE }}
          apply-log-file: generator/${{ env.APPLY_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      - name: Firefly Post Apply - VPC
        if: inputs.should_apply == true && steps.apply.outcome == 'success'
        uses: gofireflyio/fireflyci@v0.6.1
        with:
          command: post-apply
          environment: vpc
          terragrunt-version: ${{ inputs.terragrunt_version }}
          workspace: ${{ env.WORKSPACE }}
          apply-log-file: vpc/${{ env.APPLY_LOG_FILE }}
        env:
          FIREFLY_ACCESS_KEY: ${{ secrets.FIREFLY_ACCESS_KEY }}
          FIREFLY_SECRET_KEY: ${{ secrets.FIREFLY_SECRET_KEY }}

      # Capture final signal state before upload
      - name: Capture Final Signal State
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          echo "=== Final Signal State Capture ===" 
          echo "Job status: $JOB_STATUS"
          echo ""
          
          # Log to signal file
          if [ -n "$SIGNAL_LOG" ] && [ -f "$SIGNAL_LOG" ]; then
            echo "---" >> "$SIGNAL_LOG"
            echo "[$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)] Job ending - final capture" >> "$SIGNAL_LOG"
            echo "Job status: $JOB_STATUS" >> "$SIGNAL_LOG"
            echo "" >> "$SIGNAL_LOG"
            
            # Check if monitor is still running
            if [ -n "$SIGNAL_MONITOR_PID" ]; then
              if kill -0 "$SIGNAL_MONITOR_PID" 2>/dev/null; then
                echo "Signal monitor (PID $SIGNAL_MONITOR_PID) is still running" >> "$SIGNAL_LOG"
              else
                echo "Signal monitor (PID $SIGNAL_MONITOR_PID) has stopped" >> "$SIGNAL_LOG"
              fi
            fi
            
            echo "=== Signal Log Contents ==="
            cat "$SIGNAL_LOG"
          else
            echo "No signal log file found at: $SIGNAL_LOG"
          fi
          
          # List all signal debug logs
          echo ""
          echo "=== All Signal Debug Logs ==="
          ls -la /tmp/termination_signals_*.log 2>/dev/null || echo "No signal debug logs found"

      # Upload debug logs as artifact - runs even on cancellation/failure
      # This must run ASAP on job end to capture logs before runner termination
      - name: Upload Debug Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            /tmp/terraform_debug.log
            /tmp/termination_signals_*.log
            /tmp/signal_chain.log
          if-no-files-found: warn
          retention-days: 7

  # Cleanup job - runs after main job completes (success, failure, or cancellation)
  # This job runs on a fresh runner and can access artifacts uploaded by the main job
  cleanup:
    runs-on: ubuntu-latest
    needs: terragrunt-plan
    if: always()
    
    steps:
      - name: Download Debug Logs
        uses: actions/download-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: ./debug-logs
        continue-on-error: true

      - name: Display Job Status
        run: |
          echo "Main job result: ${{ needs.terragrunt-plan.result }}"
          echo "Workflow run ID: ${{ github.run_id }}"
          echo "Triggered by: ${{ github.event_name }}"
          
      - name: Process Debug Logs
        if: always()
        run: |
          echo "=== Available Debug Logs ==="
          ls -la ./debug-logs/ 2>/dev/null || echo "No debug-logs directory found"
          echo ""
          
          # Process Terraform debug log
          if [ -f ./debug-logs/terraform_debug.log ]; then
            echo "=== Terraform Debug Log Summary ==="
            echo "Log file size: $(wc -c < ./debug-logs/terraform_debug.log) bytes"
            echo "Log file lines: $(wc -l < ./debug-logs/terraform_debug.log)"
            echo ""
            echo "=== Last 100 lines of terraform debug log ==="
            tail -100 ./debug-logs/terraform_debug.log
          else
            echo "No terraform debug log file found"
          fi
          
          echo ""
          
          # Process Signal Chain Log (most important for debugging)
          if [ -f ./debug-logs/signal_chain.log ]; then
            echo "=== SIGNAL CHAIN LOG (GitHub Runner -> Terragrunt -> Terraform) ==="
            echo "Log file size: $(wc -c < ./debug-logs/signal_chain.log) bytes"
            echo "Log file lines: $(wc -l < ./debug-logs/signal_chain.log)"
            echo ""
            echo "=== Full Contents ==="
            cat ./debug-logs/signal_chain.log
            echo ""
          else
            echo "No signal chain log found"
          fi
          
          echo ""
          
          # Process individual termination signal logs
          for log in ./debug-logs/termination_signals_*.log; do
            if [ -f "$log" ]; then
              echo "=== Signal Log: $(basename "$log") ==="
              echo "Log file size: $(wc -c < "$log") bytes"
              echo "Log file lines: $(wc -l < "$log")"
              echo ""
              echo "=== Contents ==="
              cat "$log"
              echo ""
            fi
          done
          
          if ! ls ./debug-logs/termination_signals_*.log 1>/dev/null 2>&1; then
            echo "No termination signal logs found"
          fi

      - name: Report Cancellation
        if: cancelled() || needs.terragrunt-plan.result == 'cancelled'
        run: |
          echo "::warning::Workflow was cancelled. Debug logs may be incomplete."
          echo "Check the debug-logs artifact for any captured logs."
